name: Tier 1 reproducibility

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  reproduce-cpu:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Tier 1 dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run Tier 1 reproduction
        run: |
          chmod +x reproduce_cpu.sh
          ./reproduce_cpu.sh

      - name: Run smoke tests
        run: |
          python -m pytest tests/ -q
